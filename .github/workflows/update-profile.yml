name: Update Profile SVG

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */12 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate SVG files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: GurjyotSingh740-gk
          PROFILE_NAME: Gurjyot Singh
          PROFILE_ROLE: Cloud / DevOps Engineer
          PROFILE_LOCATION: Delhi, India
          PROFILE_EMAIL: sgurjyot740@gmail.com
          PROFILE_LINKEDIN: https://www.linkedin.com/in/gurjyot-singh-6b75a0232/
          PROFILE_PORTFOLIO: https://gurjyotsingh740-gk.github.io/Tech-Portfolio/
        run: python generate_profile_svg.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git diff --staged --quiet || git commit -m "Update profile SVG"
          git push
